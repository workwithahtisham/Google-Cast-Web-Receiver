<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Custom Cast Receiver</title>
  <link rel="icon" href="data:,">

  <!-- CAF Receiver SDK -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <!-- Shaka Player -->
  <script src="https://ajax.googleapis.com/ajax/libs/shaka-player/4.9.2-caf2/shaka-player.compiled.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      object-fit: contain;
      z-index: 1;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .overlay.hidden {
      display: none;
    }

    #idle-screen {
      background: #000;
    }

    .idle-logo {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .cast-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(0,212,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: ringPulse 2s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.3); }
      50% { box-shadow: 0 0 0 20px rgba(0,212,255,0); }
    }

    .cast-ring svg {
      width: 32px;
      height: 32px;
      fill: #00d4ff;
    }

    .idle-label {
      margin-top: 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }

    #idle-clock {
      position: fixed;
      bottom: 48px;
      right: 56px;
      text-align: right;
      pointer-events: none;
    }

    #clock-time {
      font-size: 52px;
      font-weight: 300;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    #clock-date {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    #loading-overlay {
      background: #000;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loader-status {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
    }

    #error-overlay {
      background: #0a0a0a;
    }

    .error-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    .error-title {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
    }

    .error-msg {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }

    .error-code {
      margin-top: 10px;
      font-size: 11px;
      font-family: monospace;
      color: rgba(255,255,255,0.25);
    }

    #hud {
      position: fixed;
      top: 24px;
      left: 32px;
      z-index: 20;
      display: flex;
      gap: 8px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }

    #hud.visible {
      opacity: 1;
    }

    .hud-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      font-family: monospace;
      letter-spacing: 0.05em;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00d4ff;
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
  </style>
</head>

<body>

  <video id="video" playsinline autoplay></video>

  <div id="idle-screen" class="overlay">
    <div class="idle-logo">Cast Receiver</div>
    <div class="cast-ring">
      <svg viewBox="0 0 24 24">
        <path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2a9 9 0 0 1 9 9h2C12 12.37 7.63 8 2 8zm18-7H3C1.9 2 1 2.9 1 4v3h2V4h18v16h-7v2h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
    </div>
    <div class="idle-label">Ready to receive</div>
    <div id="idle-clock">
      <div id="clock-time">00:00</div>
      <div id="clock-date"></div>
    </div>
  </div>

  <div id="loading-overlay" class="overlay hidden">
    <div class="spinner"></div>
    <div id="loader-status">Loading…</div>
  </div>

  <div id="error-overlay" class="overlay hidden">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Playback Error</div>
    <div class="error-msg" id="error-msg">Unable to play this media.</div>
    <div class="error-code" id="error-code"></div>
  </div>

  <div id="hud">
    <div class="hud-pill">
      <span class="live-dot"></span>
      <span id="hud-state">PLAYING</span>
    </div>
    <div class="hud-pill" id="hud-format" style="display:none"></div>
  </div>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    const video = document.getElementById('video');
    const idleScreen = document.getElementById('idle-screen');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loaderStatus = document.getElementById('loader-status');
    const errorOverlay = document.getElementById('error-overlay');
    const errorMsg = document.getElementById('error-msg');
    const errorCode = document.getElementById('error-code');
    const hud = document.getElementById('hud');
    const hudState = document.getElementById('hud-state');
    const hudFormat = document.getElementById('hud-format');

    let shakaPlayer = null;
    let currentMediaInfo = null;
    let hasStartedPlaying = false;
    let isShakaAttached = false;

    function showState(state, opts = {}) {
      idleScreen.classList.add('hidden');
      loadingOverlay.classList.add('hidden');
      errorOverlay.classList.add('hidden');
      hud.classList.remove('visible');

      switch (state) {
        case 'idle':
          hasStartedPlaying = false;
          idleScreen.classList.remove('hidden');
          break;

        case 'loading':
          if (!hasStartedPlaying) {
            loadingOverlay.classList.remove('hidden');
            loaderStatus.textContent = opts.msg || 'Loading…';
          }
          break;

        case 'playing':
          hasStartedPlaying = true;
          hudState.textContent = 'PLAYING';
          hud.classList.add('visible');
          break;

        case 'paused':
          hasStartedPlaying = true;
          hudState.textContent = 'PAUSED';
          hud.classList.add('visible');
          break;

        case 'error':
          hasStartedPlaying = false;
          errorOverlay.classList.remove('hidden');
          errorMsg.textContent = opts.msg || 'Unable to play this media.';
          errorCode.textContent = opts.code ? `Code: ${opts.code}` : '';
          break;
      }
    }

    function updateClock() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const mons = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      document.getElementById('clock-time').textContent = `${hh}:${mm}`;
      document.getElementById('clock-date').textContent =
        `${days[now.getDay()]} ${mons[now.getMonth()]} ${now.getDate()}`;
    }

    function detectMime(url) {
      const u = (url || '').split('?')[0].toLowerCase();
      if (u.endsWith('.m3u8')) return 'application/x-mpegURL';
      if (u.endsWith('.mpd')) return 'application/dash+xml';
      if (u.endsWith('.webm')) return 'video/webm';
      if (u.endsWith('.mkv')) return 'video/x-matroska';
      if (u.endsWith('.mp3')) return 'audio/mpeg';
      if (u.endsWith('.aac')) return 'audio/aac';
      if (u.endsWith('.m4a')) return 'audio/mp4';
      if (u.endsWith('.mov')) return 'video/mp4';
      return 'video/mp4';
    }

    function getFormatLabel(contentType) {
      if (!contentType) return 'VIDEO';
      const parts = contentType.split('/');
      return (parts[1] || parts[0] || 'VIDEO').toUpperCase();
    }

    async function setupShaka() {
      if (!shaka.Player.isBrowserSupported()) {
        throw new Error('Shaka Player is not supported on this device.');
      }

      shakaPlayer = new shaka.Player();

      if (!isShakaAttached) {
        await shakaPlayer.attach(video);
        isShakaAttached = true;
      }

      shakaPlayer.addEventListener('error', onShakaError);
    }

    function onShakaError(event) {
      const detail = event.detail || {};
      console.error('[Receiver] Shaka error:', detail);

      showState('error', {
        msg: 'Could not play this media.',
        code: detail.code || ''
      });

      try {
        playerManager.sendError(
          new cast.framework.messages.ErrorData(
            cast.framework.messages.ErrorType.LOAD_FAILED
          )
        );
      } catch (e) {
        console.error('[Receiver] sendError failed:', e);
      }
    }

    async function clearPlayback() {
      try {
        video.pause();
      } catch (_) {}

      try {
        if (shakaPlayer) {
          await shakaPlayer.unload();
        }
      } catch (e) {
        console.warn('[Receiver] Shaka unload warning:', e);
      }

      video.removeAttribute('src');
      video.load();
      currentMediaInfo = null;
    }

    async function loadMedia(request) {
      const media = request.media || {};
      const url = media.contentUrl || media.contentId;

      if (!url) {
        throw new Error('Missing media URL');
      }

      const contentType = media.contentType || detectMime(url);
      media.contentType = contentType;
      currentMediaInfo = media;

      hudFormat.textContent = getFormatLabel(contentType);
      hudFormat.style.display = 'flex';

      showState('loading', { msg: 'Loading media…' });

      await clearPlayback();

      const startTime = typeof request.currentTime === 'number' ? request.currentTime : 0;
      const useShaka =
        contentType === 'application/x-mpegURL' ||
        contentType === 'application/dash+xml';

      if (useShaka) {
        await shakaPlayer.load(url, startTime);
      } else {
        video.src = url;

        await new Promise((resolve, reject) => {
          const onLoadedMetadata = () => {
            cleanup();
            resolve();
          };

          const onError = () => {
            cleanup();
            reject(new Error('Native video load failed'));
          };

          const cleanup = () => {
            video.removeEventListener('loadedmetadata', onLoadedMetadata);
            video.removeEventListener('error', onError);
          };

          video.addEventListener('loadedmetadata', onLoadedMetadata, { once: true });
          video.addEventListener('error', onError, { once: true });
          video.load();
        });

        if (startTime > 0 && Number.isFinite(startTime)) {
          try {
            video.currentTime = startTime;
          } catch (_) {}
        }
      }

      playerManager.setMediaInformation(media, true);

      if (request.autoplay === false) {
        video.pause();
        showState('paused');
      } else {
        try {
          await video.play();
          showState('playing');
        } catch (e) {
          console.warn('[Receiver] Autoplay play() warning:', e);
          showState('paused');
        }
      }
    }

    playerManager.setMediaElement(video);

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      async (request) => {
        try {
          await loadMedia(request);
          return request;
        } catch (e) {
          console.error('[Receiver] LOAD failed:', e);
          showState('error', {
            msg: 'Could not play this media. Check the URL or format.',
            code: e.message || ''
          });

          return new cast.framework.messages.ErrorData(
            cast.framework.messages.ErrorType.LOAD_FAILED
          );
        }
      }
    );

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.PLAY,
      async (request) => {
        try {
          await video.play();
          showState('playing');
          return request;
        } catch (e) {
          console.error('[Receiver] PLAY failed:', e);
          return new cast.framework.messages.ErrorData(
            cast.framework.messages.ErrorType.INVALID_PLAYER_STATE
          );
        }
      }
    );

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.PAUSE,
      (request) => {
        try {
          video.pause();
          showState('paused');
          return request;
        } catch (e) {
          console.error('[Receiver] PAUSE failed:', e);
          return new cast.framework.messages.ErrorData(
            cast.framework.messages.ErrorType.INVALID_PLAYER_STATE
          );
        }
      }
    );

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.SEEK,
      async (request) => {
        try {
          if (typeof request.currentTime === 'number' && Number.isFinite(request.currentTime)) {
            video.currentTime = request.currentTime;
          }

          if (!video.paused) {
            try {
              await video.play();
            } catch (_) {}
          }

          return request;
        } catch (e) {
          console.error('[Receiver] SEEK failed:', e);
          return new cast.framework.messages.ErrorData(
            cast.framework.messages.ErrorType.INVALID_REQUEST
          );
        }
      }
    );

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.STOP,
      async (request) => {
        try {
          await clearPlayback();
          playerManager.setIdleReason(cast.framework.messages.IdleReason.CANCELLED);
          showState('idle');
          return request;
        } catch (e) {
          console.error('[Receiver] STOP failed:', e);
          return new cast.framework.messages.ErrorData(
            cast.framework.messages.ErrorType.INVALID_PLAYER_STATE
          );
        }
      }
    );

    video.addEventListener('playing', () => {
      showState('playing');
      try { playerManager.sendStatus(); } catch (_) {}
    });

    video.addEventListener('play', () => {
      showState('playing');
      try { playerManager.sendStatus(); } catch (_) {}
    });

    video.addEventListener('pause', () => {
      if (!video.ended) {
        showState('paused');
      }
      try { playerManager.sendStatus(); } catch (_) {}
    });

    video.addEventListener('waiting', () => {
      if (!hasStartedPlaying) {
        showState('loading', { msg: 'Buffering…' });
      }
      try { playerManager.sendStatus(); } catch (_) {}
    });

    video.addEventListener('seeking', () => {
      try { playerManager.sendStatus(); } catch (_) {}
    });

    video.addEventListener('seeked', () => {
      try { playerManager.sendStatus(); } catch (_) {}
    });

    video.addEventListener('ended', async () => {
      try {
        playerManager.setIdleReason(cast.framework.messages.IdleReason.FINISHED);
      } catch (_) {}

      try {
        await clearPlayback();
      } catch (_) {}

      showState('idle');

      try { playerManager.sendStatus(); } catch (_) {}
    });

    video.addEventListener('error', () => {
      const mediaError = video.error;
      console.error('[Receiver] Native video error:', mediaError);

      showState('error', {
        msg: 'Native video playback failed.',
        code: mediaError ? mediaError.code : ''
      });

      try {
        playerManager.sendError(
          new cast.framework.messages.ErrorData(
            cast.framework.messages.ErrorType.LOAD_FAILED
          )
        );
      } catch (_) {}
    });

    context.addEventListener(cast.framework.system.EventType.READY, () => {
      console.log('[Receiver] Ready');
      showState('idle');
    });

    context.addEventListener(cast.framework.system.EventType.SENDER_CONNECTED, (e) => {
      console.log('[Receiver] Sender connected:', e.senderId);
    });

    context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, (e) => {
      console.log('[Receiver] Sender disconnected:', e.senderId);
    });

    updateClock();
    setInterval(updateClock, 15000);

    (async function startReceiver() {
      try {
        await setupShaka();
        context.start();
        console.log('[Receiver] Custom Shaka receiver started');
      } catch (e) {
        console.error('[Receiver] Startup failed:', e);
        showState('error', {
          msg: 'Receiver startup failed.',
          code: e.message || ''
        });
      }
    })();
  </script>
</body>
</html>
