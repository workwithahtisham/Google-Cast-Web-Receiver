<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Custom Cast Receiver with Shaka</title>
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    const video = document.getElementById('video');
    const shakaPlayer = new shaka.Player(video);

    // Tell CAF to use this media element instead of its own player UI pipeline.
    playerManager.setMediaElement(video);

    let currentMediaInfo = null;

    function guessContentType(url) {
      const u = (url || '').split('?')[0].toLowerCase();
      if (u.endsWith('.m3u8')) return 'application/x-mpegURL';
      if (u.endsWith('.mpd')) return 'application/dash+xml';
      if (u.endsWith('.mp4')) return 'video/mp4';
      if (u.endsWith('.webm')) return 'video/webm';
      return 'video/mp4';
    }

    async function loadIntoCustomPlayer(request) {
      const media = request.media || {};
      const url = media.contentUrl || media.contentId;
      const contentType = media.contentType || guessContentType(url);

      if (!url) {
        throw new cast.framework.messages.ErrorData(
          cast.framework.messages.ErrorType.LOAD_FAILED
        );
      }

      currentMediaInfo = media;

      // HLS/DASH -> Shaka
      if (contentType === 'application/x-mpegURL' ||
          contentType === 'application/dash+xml') {
        await shakaPlayer.load(url);
      } else {
        // MP4/WebM/direct file
        video.src = url;
        await video.play().catch(() => {});
      }

      // Make sure CAF knows what is loaded.
      playerManager.setMediaInformation(media, true);

      return request;
    }

    // LOAD
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      async (request) => {
        try {
          await loadIntoCustomPlayer(request);

          if (request.currentTime != null && !isNaN(request.currentTime)) {
            video.currentTime = request.currentTime;
          }

          if (request.autoplay === false) {
            video.pause();
          } else {
            await video.play().catch(() => {});
          }

          return request;
        } catch (e) {
          console.error('LOAD failed', e);
          return new cast.framework.messages.ErrorData(
            cast.framework.messages.ErrorType.LOAD_FAILED
          );
        }
      }
    );

    // PLAY
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.PLAY,
      async (request) => {
        try {
          await video.play();
          return request;
        } catch (e) {
          console.error('PLAY failed', e);
          return new cast.framework.messages.ErrorData(
            cast.framework.messages.ErrorType.INVALID_PLAYER_STATE
          );
        }
      }
    );

    // PAUSE
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.PAUSE,
      (request) => {
        video.pause();
        return request;
      }
    );

    // SEEK
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.SEEK,
      (request) => {
        if (request.currentTime != null && !isNaN(request.currentTime)) {
          video.currentTime = request.currentTime;
        }
        return request;
      }
    );

    // STOP
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.STOP,
      (request) => {
        video.pause();
        video.removeAttribute('src');
        video.load();
        playerManager.setIdleReason(cast.framework.messages.IdleReason.CANCELLED);
        return request;
      }
    );

    // Keep CAF status aligned with the custom player state.
    video.addEventListener('play',   () => playerManager.sendStatus());
    video.addEventListener('pause',  () => playerManager.sendStatus());
    video.addEventListener('seeking',() => playerManager.sendStatus());
    video.addEventListener('seeked', () => playerManager.sendStatus());
    video.addEventListener('waiting',() => playerManager.sendStatus());
    video.addEventListener('playing',() => playerManager.sendStatus());
    video.addEventListener('ended',  () => {
      playerManager.setIdleReason(cast.framework.messages.IdleReason.FINISHED);
      playerManager.sendStatus();
    });
    video.addEventListener('error',  () => {
      playerManager.sendError(
        new cast.framework.messages.ErrorData(
          cast.framework.messages.ErrorType.LOAD_FAILED
        )
      );
    });

    // Optional: Shaka error forwarding
    shakaPlayer.addEventListener('error', (event) => {
      console.error('Shaka error', event.detail);
      playerManager.sendError(
        new cast.framework.messages.ErrorData(
          cast.framework.messages.ErrorType.LOAD_FAILED
        )
      );
    });

    context.start();
  </script>
</body>
</html>
