<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Custom Cast Receiver</title>

  <!-- Prevent favicon 404 -->
  <link rel="icon" href="data:,">

  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    cast-media-player {
      width: 100%;
      height: 100%;
      display: block;
      --theme-hue: 210;
      --progress-color: #4fc3f7;
      --splash-image: none;
      --splash-color: #000000;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-logo {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 24px;
    }

    .loader-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .loader-text {
      margin-top: 18px;
      font-size: 14px;
      color: rgba(255,255,255,0.55);
    }

    #error-overlay {
      position: absolute;
      inset: 0;
      background: #0a0a0a;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 200;
    }

    #error-overlay.visible {
      display: flex;
    }

    .error-title {
      color: #fff;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .error-message {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }

    #codec-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      padding: 6px 12px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #codec-badge.visible {
      opacity: 1;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<cast-media-player></cast-media-player>

<div id="loading-overlay">
  <div class="loader-logo">CAST RECEIVER</div>
  <div class="loader-spinner"></div>
  <div class="loader-text" id="loader-status">Waiting for content…</div>
</div>

<div id="error-overlay">
  <div class="error-title">Playback Error</div>
  <div class="error-message" id="error-message">Unable to play media</div>
</div>

<div id="codec-badge"></div>

<script>
const context = cast.framework.CastReceiverContext.getInstance();
const playerManager = context.getPlayerManager();
const playbackConfig = new cast.framework.PlaybackConfig();

const loadingOverlay = document.getElementById('loading-overlay');
const loaderStatus = document.getElementById('loader-status');
const errorOverlay = document.getElementById('error-overlay');
const errorMessage = document.getElementById('error-message');
const codecBadge = document.getElementById('codec-badge');

function showLoading(msg) {
  if (msg) loaderStatus.textContent = msg;
  loadingOverlay.classList.remove('hidden');
}

function hideLoading() {
  loadingOverlay.classList.add('hidden');
}

function showError(msg) {
  hideLoading();
  errorMessage.textContent = msg;
  errorOverlay.classList.add('visible');
}

function detectMime(url) {
  url = (url || '').toLowerCase();
  if (url.endsWith('.m3u8')) return 'application/x-mpegURL';
  if (url.endsWith('.mpd')) return 'application/dash+xml';
  if (url.endsWith('.webm')) return 'video/webm';
  if (url.endsWith('.mkv')) return 'video/x-matroska';
  return 'video/mp4';
}

function showCodec(label) {
  codecBadge.textContent = label;
  codecBadge.classList.add('visible');
  setTimeout(() => codecBadge.classList.remove('visible'), 4000);
}

/* =========================
   LOAD INTERCEPTOR
========================= */
playerManager.setMessageInterceptor(
  cast.framework.messages.MessageType.LOAD,
  (request) => {

    const media = request.media;

    if (!media.contentUrl && media.contentId) {
      media.contentUrl = media.contentId;
    }

    if (!media.contentType) {
      media.contentType = detectMime(media.contentUrl);
    }

    showLoading('Loading video...');

    return request;
  }
);

/* =========================
   PLAYER EVENTS
========================= */
playerManager.addEventListener(
  cast.framework.events.EventType.MEDIA_STATUS,
  (event) => {
    const state = event.mediaStatus.playerState;

    if (state === cast.framework.messages.PlayerState.PLAYING) {
      hideLoading();
      showCodec('Playing');
    }

    if (state === cast.framework.messages.PlayerState.BUFFERING) {
      showLoading('Buffering...');
    }
  }
);

playerManager.addEventListener(
  cast.framework.events.EventType.ERROR,
  (event) => {
    console.error(event);
    showError('Playback failed');
  }
);

playerManager.addEventListener(
  cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
  () => {
    hideLoading();
  }
);

/* =========================
   CONTEXT EVENTS (FIXED)
========================= */
context.addEventListener(
  cast.framework.system.EventType.READY,
  () => console.log('Receiver Ready')
);

context.addEventListener(
  cast.framework.system.EventType.SHUTDOWN,
  () => console.log('Receiver Shutdown')
);

/* =========================
   START RECEIVER
========================= */
context.start({ playbackConfig });

console.log('Custom Receiver Started');
</script>

</body>
</html>
