
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cast Receiver</title>
  <link rel="icon" href="data:,">
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* ── The player MUST be the base layer, never covered ── */
    cast-media-player {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
      z-index: 1;
      --theme-hue: 195;
      --progress-color: #00d4ff;
      --splash-image: none;
      --splash-color: #000000;
    }
    
    #mirror-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      z-index: 5;
      display: none;
    }

    /* ── All overlays sit above but ONLY shown when needed ── */
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none; /* never block touch/input on player */
    }

    /* Hidden state */
    .overlay.hidden {
      display: none;
    }

    /* ── Idle Screen ── */
    #idle-screen {
      background: #000;
    }

    .idle-logo {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .cast-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(0,212,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: ringPulse 2s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.3); }
      50%       { box-shadow: 0 0 0 20px rgba(0,212,255,0); }
    }

    .cast-ring svg {
      width: 32px; height: 32px;
      fill: #00d4ff;
    }

    .idle-label {
      margin-top: 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }

    #idle-clock {
      position: fixed;
      bottom: 48px;
      right: 56px;
      text-align: right;
      pointer-events: none;
    }

    #clock-time {
      font-size: 52px;
      font-weight: 300;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    #clock-date {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ── Loading Overlay ── */
    #loading-overlay {
      background: #000;
    }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loader-status {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
    }

    /* ── Error Overlay ── */
    #error-overlay {
      background: #0a0a0a;
    }

    .error-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    .error-title {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
    }

    .error-msg {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }

    .error-code {
      margin-top: 10px;
      font-size: 11px;
      font-family: monospace;
      color: rgba(255,255,255,0.25);
    }

    /* ── HUD pills — float above player, never block it ── */
    #hud {
      position: fixed;
      top: 24px;
      left: 32px;
      z-index: 20;
      display: flex;
      gap: 8px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }

    #hud.visible { opacity: 1; }

    .hud-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      font-family: monospace;
      letter-spacing: 0.05em;
    }

    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #00d4ff;
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }
  </style>
</head>

<body>

  <!-- 1. Player — always at base, NEVER hidden or covered -->
  <cast-media-player></cast-media-player>
  <video id="mirror-video" autoplay playsinline muted></video>

  <!-- 2. Idle screen — shown only when no content is playing -->
  <div id="idle-screen" class="overlay">
    <div class="idle-logo">Cast Receiver</div>
    <div class="cast-ring">
      <svg viewBox="0 0 24 24">
        <path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2a9 9 0 0 1 9 9h2C12 12.37 7.63 8 2 8zm18-7H3C1.9 2 1 2.9 1 4v3h2V4h18v16h-7v2h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
    </div>
    <div class="idle-label">Ready to receive</div>
    <div id="idle-clock">
      <div id="clock-time">00:00</div>
      <div id="clock-date"></div>
    </div>
  </div>

  <!-- 3. Loading — shown only while media is preparing (before first frame) -->
  <div id="loading-overlay" class="overlay hidden">
    <div class="spinner"></div>
    <div id="loader-status">Loading…</div>
  </div>

  <!-- 4. Error — shown only on failure -->
  <div id="error-overlay" class="overlay hidden">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Playback Error</div>
    <div class="error-msg" id="error-msg">Unable to play this media.</div>
    <div class="error-code" id="error-code"></div>
  </div>

  <!-- 5. HUD pills — float above player, pointer-events none so player still works -->
  <div id="hud">
    <div class="hud-pill">
      <span class="live-dot"></span>
      <span id="hud-state">PLAYING</span>
    </div>
    <div class="hud-pill" id="hud-format" style="display:none"></div>
  </div>

<script>
/* ==============================================
   CAST RECEIVER — v2.0 Fixed
   Key rules:
   1. cast-media-player is NEVER hidden
   2. Overlays only show when there is NO video
   3. During playback ALL overlays are hidden
   4. Buffering uses the player's built-in UI
============================================== */

const context        = cast.framework.CastReceiverContext.getInstance();
const playerManager  = context.getPlayerManager();
const playbackConfig = new cast.framework.PlaybackConfig();
const mirrorNamespace = 'urn:x-cast:com.castingpractice.webrtc';

const idleScreen     = document.getElementById('idle-screen');
const loadingOverlay = document.getElementById('loading-overlay');
const loaderStatus   = document.getElementById('loader-status');
const errorOverlay   = document.getElementById('error-overlay');
const errorMsg       = document.getElementById('error-msg');
const errorCode      = document.getElementById('error-code');
const hud            = document.getElementById('hud');
const hudState       = document.getElementById('hud-state');
const hudFormat      = document.getElementById('hud-format');
const mirrorVideo    = document.getElementById('mirror-video');

let hasStartedPlaying = false; // track if we've ever played this session
let mirrorMode = false;
let activeSenderId = null;
let peerConnection = null;
let pendingIce = [];

// --- Single state machine: only one screen at a time ---
function showState(state, opts = {}) {
  idleScreen.classList.add('hidden');
  loadingOverlay.classList.add('hidden');
  errorOverlay.classList.add('hidden');
  hud.classList.remove('visible');

  switch (state) {
    case 'idle':
      hasStartedPlaying = false;
      idleScreen.classList.remove('hidden');
      break;

    case 'loading':
      // Only show loading overlay before playback starts
      if (!hasStartedPlaying) {
        loadingOverlay.classList.remove('hidden');
        loaderStatus.textContent = opts.msg || 'Loading…';
      }
      break;

    case 'playing':
      hasStartedPlaying = true;
      // ALL overlays hidden — video is fully visible
      hudState.textContent = 'PLAYING';
      hud.classList.add('visible');
      break;
    
    case 'mirroring':
      hasStartedPlaying = true;
      hudState.textContent = 'MIRRORING';
      hud.classList.add('visible');
      break;

    case 'paused':
      // Video is still visible — just update HUD label
      hudState.textContent = 'PAUSED';
      hud.classList.add('visible');
      break;

    case 'error':
      hasStartedPlaying = false;
      errorOverlay.classList.remove('hidden');
      errorMsg.textContent  = opts.msg  || 'Unable to play this media.';
      errorCode.textContent = opts.code ? `Code: ${opts.code}` : '';
      break;
  }
}

function setMirrorVisible(visible) {
  mirrorVideo.style.display = visible ? 'block' : 'none';
}

function preferH264InSdp(sdp) {
  const lines = sdp.split('\r\n');
  const h264Payloads = [];

  for (const line of lines) {
    if (!line.startsWith('a=rtpmap:')) continue;
    const rest = line.slice('a=rtpmap:'.length);
    const parts = rest.split(' ');
    if (parts.length < 2) continue;
    if (parts[1].toUpperCase().includes('H264/')) h264Payloads.push(parts[0]);
  }

  if (h264Payloads.length === 0) return sdp;

  const videoLineIndex = lines.findIndex((line) => line.startsWith('m=video '));
  if (videoLineIndex >= 0) {
    const parts = lines[videoLineIndex].split(' ');
    if (parts.length > 3) {
      const head = parts.slice(0, 3);
      const payloads = parts.slice(3);
      payloads.sort((a, b) => {
        const aH264 = h264Payloads.includes(a);
        const bH264 = h264Payloads.includes(b);
        if (aH264 === bH264) return 0;
        return aH264 ? -1 : 1;
      });
      lines[videoLineIndex] = [...head, ...payloads].join(' ');
    }
  }

  return lines.join('\r\n');
}

function optimizeMirrorSdp(sdp) {
  const preferred = preferH264InSdp(sdp);
  const lines = preferred.split('\r\n');
  const h264Payloads = new Set();
  for (const line of lines) {
    if (!line.startsWith('a=rtpmap:')) continue;
    const rest = line.slice('a=rtpmap:'.length);
    const parts = rest.split(' ');
    if (parts.length < 2) continue;
    if (parts[1].toUpperCase().includes('H264/')) h264Payloads.add(parts[0]);
  }
  const out = [];
  let inVideo = false;
  let bandwidthInjected = false;

  for (const line of lines) {
    if (line.startsWith('m=')) {
      inVideo = line.startsWith('m=video ');
      bandwidthInjected = false;
      out.push(line);
      continue;
    }

    if (inVideo && line.startsWith('c=')) {
      out.push(line);
      if (!bandwidthInjected) {
        out.push('b=AS:40000');
        out.push('b=TIAS:40000000');
        bandwidthInjected = true;
      }
      continue;
    }

    if (inVideo && line.startsWith('a=fmtp:') && !line.includes('apt=')) {
      let updated = line;
      const payload = line.slice('a=fmtp:'.length).split(' ')[0];
      const isH264 = h264Payloads.has(payload);

      if (isH264) {
        if (updated.includes('profile-level-id=')) {
          updated = updated.replace(/profile-level-id=[0-9a-fA-F]{6}/g, 'profile-level-id=640032');
        } else {
          updated += ';profile-level-id=640032;packetization-mode=1;level-asymmetry-allowed=1';
        }
      }

      if (!updated.includes('x-google-start-bitrate')) updated += ';x-google-start-bitrate=16000';
      if (!updated.includes('x-google-max-bitrate')) updated += ';x-google-max-bitrate=40000';
      if (!updated.includes('x-google-min-bitrate')) updated += ';x-google-min-bitrate=8000';
      out.push(updated);
      continue;
    }

    out.push(line);
  }

  return out.join('\r\n');
}

function resetMirrorSession() {
  pendingIce = [];
  if (peerConnection) {
    peerConnection.ontrack = null;
    peerConnection.onicecandidate = null;
    peerConnection.onconnectionstatechange = null;
    peerConnection.close();
    peerConnection = null;
  }
  mirrorVideo.srcObject = null;
  setMirrorVisible(false);
  mirrorMode = false;
  if (playerManager.getPlayerState() === PS.PLAYING) {
    showState('playing');
  } else if (playerManager.getPlayerState() === PS.PAUSED) {
    showState('paused');
  } else {
    showState('idle');
  }
}

function sendMirrorMessage(type, payload = {}) {
  if (!activeSenderId) return;
  context.sendCustomMessage(mirrorNamespace, activeSenderId, { type, ...payload });
}

async function createPeerConnection() {
  if (peerConnection) return peerConnection;
  peerConnection = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  });
  
  peerConnection.ontrack = (event) => {
    if (!event.streams || event.streams.length === 0) return;
    mirrorVideo.srcObject = event.streams[0];
    setMirrorVisible(true);
    mirrorMode = true;
    showState('mirroring');
  };
  
  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      sendMirrorMessage('receiverCandidate', { candidate: event.candidate });
    }
  };
  
  peerConnection.onconnectionstatechange = () => {
    const state = peerConnection.connectionState;
    if (state === 'failed' || state === 'closed' || state === 'disconnected') {
      resetMirrorSession();
    }
  };
  
  for (const candidate of pendingIce) {
    try {
      await peerConnection.addIceCandidate(candidate);
    } catch (e) {
      console.error('[Receiver] Failed to apply pending ICE', e);
    }
  }
  pendingIce = [];
  
  return peerConnection;
}

context.addCustomMessageListener(mirrorNamespace, async (event) => {
  try {
    const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
    const type = data?.type;
    activeSenderId = event.senderId || activeSenderId;
    
    if (type === 'startMirror') {
      await createPeerConnection();
      playerManager.stop();
      showState('loading', { msg: 'Starting mirroring…' });
      return;
    }
    
    if (type === 'offer' && data.sdp) {
      const pc = await createPeerConnection();
      await pc.setRemoteDescription({ type: 'offer', sdp: data.sdp });
      const answer = await pc.createAnswer();
      const optimizedAnswer = {
        type: 'answer',
        sdp: optimizeMirrorSdp(answer.sdp || '')
      };
      await pc.setLocalDescription(optimizedAnswer);
      sendMirrorMessage('answer', { sdp: optimizedAnswer.sdp });
      return;
    }
    
    if (type === 'candidate' && data.candidate) {
      const ice = new RTCIceCandidate(data.candidate);
      if (peerConnection && peerConnection.remoteDescription) {
        await peerConnection.addIceCandidate(ice);
      } else {
        pendingIce.push(ice);
      }
      return;
    }
    
    if (type === 'stopMirror') {
      resetMirrorSession();
    }
  } catch (error) {
    console.error('[Receiver] Mirror message error', error);
    sendMirrorMessage('mirrorError', { message: String(error) });
  }
});

// --- MIME detection ---
function detectMime(url) {
  const u = (url || '').split('?')[0].toLowerCase();
  if (u.endsWith('.m3u8'))  return 'application/x-mpegURL';
  if (u.endsWith('.mpd'))   return 'application/dash+xml';
  if (u.endsWith('.webm'))  return 'video/webm';
  if (u.endsWith('.mkv'))   return 'video/x-matroska';
  if (u.endsWith('.mp3'))   return 'audio/mpeg';
  if (u.endsWith('.aac'))   return 'audio/aac';
  return 'video/mp4';
}

// --- Clock ---
function updateClock() {
  const now  = new Date();
  const hh   = String(now.getHours()).padStart(2, '0');
  const mm   = String(now.getMinutes()).padStart(2, '0');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const mons = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clock-time').textContent = `${hh}:${mm}`;
  document.getElementById('clock-date').textContent =
    `${days[now.getDay()]} ${mons[now.getMonth()]} ${now.getDate()}`;
}
updateClock();
setInterval(updateClock, 15000);

/* ── LOAD INTERCEPTOR ── */
playerManager.setMessageInterceptor(
  cast.framework.messages.MessageType.LOAD,
  (request) => {
    const media = request.media;

    if (!media.contentUrl && media.contentId) {
      media.contentUrl = media.contentId;
    }

    if (!media.contentType) {
      media.contentType = detectMime(media.contentUrl);
    }

    const fmt = media.contentType.split('/')[1]?.toUpperCase() || 'VIDEO';
    hudFormat.textContent = fmt;
    hudFormat.style.display = 'flex';

    showState('loading', { msg: 'Loading media…' });

    return request;
  }
);

/* ── PLAYER EVENTS ── */
const EV = cast.framework.events.EventType;
const PS = cast.framework.messages.PlayerState;

playerManager.addEventListener(EV.MEDIA_STATUS, (event) => {
  if (mirrorMode) return;
  if (!event.mediaStatus) return;
  const state = event.mediaStatus.playerState;

  if (state === PS.PLAYING) {
    // This is the critical one — hide ALL overlays
    showState('playing');
  } else if (state === PS.PAUSED) {
    showState('paused');
  } else if (state === PS.BUFFERING) {
    // Do NOT show our loading overlay — let cast-media-player handle buffering UI
    // Only show loading if we haven't played yet
    if (!hasStartedPlaying) {
      loaderStatus.textContent = 'Buffering…';
    }
  } else if (state === PS.IDLE) {
    const reason = event.mediaStatus.idleReason;
    if (reason === 'FINISHED' || reason === 'CANCELLED' || reason === 'ERROR') {
      showState('idle');
    }
  }
});

// This fires when media is fully loaded and ready — most reliable signal
playerManager.addEventListener(EV.PLAYER_LOAD_COMPLETE, () => {
  if (mirrorMode) return;
  console.log('[Receiver] Load complete — showing video');
  showState('playing');
});

playerManager.addEventListener(EV.ERROR, (event) => {
  if (mirrorMode) return;
  console.error('[Receiver] Error:', JSON.stringify(event));
  showState('error', {
    msg: 'Could not play this media. Check the URL or format.',
    code: event.detailedErrorCode || ''
  });
});

playerManager.addEventListener(EV.ENDED, () => {
  if (mirrorMode) return;
  showState('idle');
});

/* ── CONTEXT EVENTS ── */
context.addEventListener(cast.framework.system.EventType.READY, () => {
  console.log('[Receiver] Ready');
  showState('idle');
});

context.addEventListener(cast.framework.system.EventType.SENDER_CONNECTED, (e) => {
  console.log('[Receiver] Sender connected:', e.senderId);
});

context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, (e) => {
  console.log('[Receiver] Sender disconnected:', e.senderId);
  if (e.senderId === activeSenderId) {
    resetMirrorSession();
    activeSenderId = null;
  }
});

/* ── START ── */
context.start({ playbackConfig });
console.log('[Receiver] Started v2.0');
</script>

</body>
</html>
